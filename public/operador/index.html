<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contagem Rei AutoParts — Operador</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen p-8">
  <header class="flex items-center justify-between mb-8">
    <h1 class="text-2xl font-bold">Contagem Rei AutoParts</h1>
    <div class="flex items-center gap-2">
      <span class="text-sm text-slate-600">Sync:</span>
      <span id="sync-badge" class="px-3 py-1 rounded-full bg-slate-200 text-sm font-medium">—</span>
    </div>
  </header>

  <main class="max-w-4xl mx-auto space-y-6">
    <section class="bg-white rounded-xl shadow p-6">
      <h2 class="text-lg font-semibold mb-4">Nova sessão de contagem</h2>
      <form id="form-abrir" class="grid grid-cols-2 gap-4">
        <label class="flex flex-col text-sm">
          Embarque
          <select id="sel-embarque" class="border rounded px-3 py-2 mt-1" required></select>
        </label>
        <label class="flex flex-col text-sm">
          Operador
          <select id="sel-operador" class="border rounded px-3 py-2 mt-1" required></select>
        </label>
        <label class="flex flex-col text-sm">
          OP
          <input id="in-op" type="text" class="border rounded px-3 py-2 mt-1" placeholder="Código OP" required>
        </label>
        <label class="flex flex-col text-sm">
          Câmera
          <select id="sel-camera" class="border rounded px-3 py-2 mt-1" required>
            <option value="1">Câmera 1</option>
            <option value="2">Câmera 2</option>
          </select>
        </label>
        <button type="submit" class="col-span-2 bg-indigo-600 text-white rounded py-3 font-medium hover:bg-indigo-700">
          Abrir sessão
        </button>
      </form>
    </section>

    <section id="sec-programa" class="bg-white rounded-xl shadow p-6 hidden">
      <h2 class="text-lg font-semibold mb-4">Selecionar programa da câmera</h2>
      <input id="in-prog-search" type="text" placeholder="Buscar programa..." class="w-full border rounded px-3 py-2 mb-3">
      <ul id="lst-programas" class="space-y-1 max-h-60 overflow-auto"></ul>
    </section>

    <section id="sec-contagem" class="bg-white rounded-xl shadow p-6 hidden">
      <h2 class="text-lg font-semibold mb-4">Sessão ativa</h2>
      <div id="contagem-display" class="text-6xl font-extrabold text-indigo-600 text-center py-8">0</div>
      <form id="form-encerrar" class="flex gap-3">
        <input id="in-caixa" type="text" placeholder="Número da caixa" class="flex-1 border rounded px-3 py-2" required>
        <button type="submit" class="bg-emerald-600 text-white rounded px-6 font-medium hover:bg-emerald-700">
          Encerrar caixa
        </button>
      </form>
    </section>
  </main>

  <script type="module">
    import * as app from '/js/operador-app.js';

    let sessaoAtual = null;
    let cameraAtual = null;

    function pintarBadge(estado) {
      const badge = document.getElementById('sync-badge');
      badge.textContent = estado;
      const classes = { ONLINE: 'bg-green-200 text-green-800', OFFLINE: 'bg-yellow-200 text-yellow-800', RECOVERY: 'bg-blue-200 text-blue-800' };
      badge.className = `px-3 py-1 rounded-full text-sm font-medium ${classes[estado] ?? 'bg-slate-200'}`;
    }
    document.addEventListener('ws:sync.status', (e) => pintarBadge(e.detail.estado));
    document.addEventListener('health', (e) => pintarBadge(e.detail.sync.estado));

    document.addEventListener('ws:contagem.incrementada', (e) => {
      if (sessaoAtual && e.detail.sessao_id === sessaoAtual.id) {
        document.getElementById('contagem-display').textContent = e.detail.quantidade_total;
      }
    });

    async function popularDropdowns() {
      const [embarques, operadores] = await Promise.all([
        app.carregarEmbarquesAbertos(),
        app.carregarOperadores(),
      ]);
      document.getElementById('sel-embarque').innerHTML =
        embarques.map(e => `<option value="${e.numero_embarque}">${e.numero_embarque}</option>`).join('');
      document.getElementById('sel-operador').innerHTML =
        operadores.map(o => `<option value="${o.codigo}">${o.codigo} — ${o.nome}</option>`).join('');
    }
    popularDropdowns().catch(e => alert(`Falha carregando dropdowns: ${e.message}`));

    document.getElementById('form-abrir').addEventListener('submit', async (ev) => {
      ev.preventDefault();
      try {
        sessaoAtual = await app.abrirSessao({
          numero_embarque: document.getElementById('sel-embarque').value,
          codigo_op: document.getElementById('in-op').value,
          codigo_operador: document.getElementById('sel-operador').value,
          camera_id: Number(document.getElementById('sel-camera').value),
        });
        cameraAtual = sessaoAtual.camera_id;
        document.getElementById('sec-programa').classList.remove('hidden');
        await carregarProgramas('');
      } catch (e) { alert(e.message); }
    });

    async function carregarProgramas(q) {
      const lista = await app.buscarProgramas(cameraAtual, q);
      document.getElementById('lst-programas').innerHTML = lista.map(p => `
        <li><button data-num="${p.numero}" data-nome="${p.nome}"
            class="w-full text-left px-4 py-2 rounded border hover:bg-indigo-50">
          ${String(p.numero).padStart(3,'0')} — ${p.nome}
        </button></li>
      `).join('');
      document.querySelectorAll('#lst-programas button').forEach(btn => {
        btn.addEventListener('click', async () => {
          try {
            await app.confirmarSessao(sessaoAtual.id, { programaNumero: Number(btn.dataset.num), programaNome: btn.dataset.nome });
            document.getElementById('sec-programa').classList.add('hidden');
            document.getElementById('sec-contagem').classList.remove('hidden');
          } catch (e) { alert(e.message); }
        });
      });
    }

    document.getElementById('in-prog-search').addEventListener('input', (e) => carregarProgramas(e.target.value));

    document.getElementById('form-encerrar').addEventListener('submit', async (ev) => {
      ev.preventDefault();
      try {
        await app.encerrarSessao(sessaoAtual.id, document.getElementById('in-caixa').value);
        sessaoAtual = null;
        document.getElementById('sec-contagem').classList.add('hidden');
        document.getElementById('contagem-display').textContent = '0';
        document.getElementById('in-caixa').value = '';
        document.getElementById('form-abrir').reset();
        popularDropdowns();
      } catch (e) { alert(e.message); }
    });
  </script>
</body>
</html>
